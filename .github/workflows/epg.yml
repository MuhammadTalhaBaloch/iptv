name: Generate EPG

# Regenerates the TV guide daily from iptv-org/epg and publishes it to the
# gh-pages branch. No GitHub Pages setup needed — the file is served at:
#   https://raw.githubusercontent.com/MuhammadTalhaBaloch/iptv/gh-pages/guide.xml
#   (gzip: .../guide.xml.gz)
# Free on public repos (GitHub Actions has no minute limit for public repos).

on:
  schedule:
    - cron: '30 1 * * *'   # daily at 01:30 UTC
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write           # needed to publish to the gh-pages branch

concurrency:
  group: epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # Fresh clone of the latest iptv-org/epg on EVERY run (runners are ephemeral,
      # ref=master = branch tip), so upstream channel/site changes are always included.
      - name: Checkout iptv-org/epg (latest master)
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          ref: master
          fetch-depth: 1

      - name: Show upstream version used this run
        run: |
          echo "iptv-org/epg commit: $(git rev-parse HEAD)"
          echo "committed at:        $(git show -s --format=%ci HEAD)"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      # India EPG sources (~1,829 channels). Big general sites (sky/mytelly/epg.iptvx.one)
      # were dropped — together they pulled 14k+ channels and OOM'd the grabber, and they
      # were the only carriers of the ~11 Pakistani channels (negligible; add back later
      # via a custom --channels file if wanted). Note: some India sites geo-block GitHub's
      # US runners (403); the run still publishes whatever it successfully grabbed.
      # Add/remove sites from https://github.com/iptv-org/epg/blob/master/SITES.md
      - name: Grab guide
        env:
          NODE_OPTIONS: --max-old-space-size=6144   # runner has ~16 GB; avoid heap-limit OOM
        run: >
          npm run grab ---
          --sites=tataplay.com,dishtv.in,airtelxstream.in,zee5.com
          --maxConnections=10
          --days=1
          --output=public/guide.xml
          --gzip

      - name: Publish guide to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.IPTVPAT }}   # PAT with Contents:write on this repo
          publish_dir: ./public
          force_orphan: true    # keep gh-pages a single clean commit (no history bloat)
