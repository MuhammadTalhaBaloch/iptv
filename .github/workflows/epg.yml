name: Generate EPG

# Regenerates the TV guide daily from iptv-org/epg and publishes it to the
# gh-pages branch. No GitHub Pages setup needed — the file is served at:
#   https://raw.githubusercontent.com/MuhammadTalhaBaloch/iptv/gh-pages/guide.xml
#   (gzip: .../guide.xml.gz)
# Free on public repos (GitHub Actions has no minute limit for public repos).

on:
  schedule:
    - cron: '30 1 * * *'   # daily at 01:30 UTC
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write           # needed to publish to the gh-pages branch

concurrency:
  group: epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # Fresh clone of the latest iptv-org/epg on EVERY run (runners are ephemeral,
      # ref=master = branch tip), so upstream channel/site changes are always included.
      - name: Checkout iptv-org/epg (latest master)
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          ref: master
          fetch-depth: 1

      - name: Show upstream version used this run
        run: |
          echo "iptv-org/epg commit: $(git rev-parse HEAD)"
          echo "committed at:        $(git show -s --format=%ci HEAD)"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      # Grab EVERY iptv-org/epg site (~13k channels across ~248 sites) for full coverage.
      # Publish ONLY the gzip: the plain all-channels guide.xml is >100 MB (GitHub's per-file
      # push limit), while the .gz is ~20 MB. The app decompresses .xml.gz. Note: some sites
      # geo-block/anti-bot GitHub's US runners (403); the run still publishes what it grabbed.
      - name: Grab guide (all sites)
        env:
          NODE_OPTIONS: --max-old-space-size=7168   # runner has ~16 GB; avoid heap-limit OOM
        run: |
          SITES=$(ls sites | paste -sd, -)
          echo "Grabbing $(ls sites | wc -l) sites…"
          npm run grab --- --sites="$SITES" --maxConnections=20 --days=1 --timeout=20000 --output=guide.xml --gzip
          mkdir -p public
          mv guide.xml.gz public/guide.xml.gz     # publish only the compressed guide (< 100 MB)
          echo "sizes:"; ls -lh guide.xml public/guide.xml.gz

      - name: Publish guide to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.IPTVPAT }}   # PAT with Contents:write on this repo
          publish_dir: ./public
          force_orphan: true    # keep gh-pages a single clean commit (no history bloat)
