name: Publish app version kill-switch

# Manually run (Actions -> "Publish app version kill-switch" -> Run workflow) to disable old
# distributed app versions. It regenerates app-release.json, which the app checks on startup: a
# versionCode in blockedVersionCodes OR below minSupportedVersionCode is blocked (dead-end screen);
# everything else runs. There is NO auto-update and NO APK download — new builds are handed out
# out-of-band. Keeping versions working is the default (leave the floor low, block list empty).
on:
  workflow_dispatch:
    inputs:
      minSupportedVersionCode:
        description: "Hard floor. Any app with a versionCode BELOW this is blocked. Keep low to leave versions working; raise it to kill everything older."
        required: true
        default: "1"
        type: string
      blockedVersionCodes:
        description: "Comma-separated versionCodes to block outright (surgical kill). Blank = none."
        required: false
        default: ""
        type: string
      blockedMessage:
        description: "Message shown on the block screen (say how to get a newer build)."
        required: false
        default: "This version is no longer supported. Please install the latest version to continue."
        type: string

permissions:
  contents: write

concurrency:
  group: app-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate app-release.json
        env:
          MIN_SUPPORTED: ${{ inputs.minSupportedVersionCode }}
          BLOCKED: ${{ inputs.blockedVersionCodes }}
          BLOCKED_MSG: ${{ inputs.blockedMessage }}
        run: python3 tools/gen-app-release.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- app-release.json; then
            echo "app-release.json unchanged — nothing to commit."
          else
            git config user.name "MuhammadTalhaBaloch"
            git config user.email "MuhammadTalhaBaloch@users.noreply.github.com"
            git add app-release.json
            git commit -m "chore: update app kill-switch (min ${{ inputs.minSupportedVersionCode }}, blocked [${{ inputs.blockedVersionCodes }}])"
            # main can advance while this runs — the dashboard/data workflows push concurrently
            # (they touch other files). Rebase onto the latest main and retry so a non-fast-forward
            # push doesn't fail the run; error out only if it still can't push.
            pushed=0
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main || true
              if git push; then pushed=1; break; fi
              echo "push rejected (attempt $attempt) — retrying after rebase…"
              sleep $((attempt * 5))
            done
            [ "$pushed" = "1" ] || { echo "::error::app-release.json push failed after 3 attempts"; exit 1; }
          fi
