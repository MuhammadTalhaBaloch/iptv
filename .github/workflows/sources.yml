name: Refresh browse registry

# Regenerates the app's browse-registry data from iptv-org and commits it to `main` when it changes.
# The app fetches these and falls back to its bundled copies if missing/broken, so the browse menu
# stays current without an app update. Fast (~1 min); independent of the multi-hour EPG guide build.
#   * sources.json         — the browse menu (countries / categories / languages / regions /
#                            subdivisions / cities + index playlists).
#   * country_regions.json — country -> iptv-org region membership, used by "Play all Regions" to
#                            order the catalog by region priority (the index has no region column).

on:
  schedule:
    - cron: '15 21 * * *'   # daily at 02:15 PKT (21:15 UTC), just after the EPG run
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sources
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Check out with the PAT (not GITHUB_TOKEN) so the commit counts as repo activity and keeps
      # this scheduled workflow from being auto-disabled after 60 days.
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.IPTVPAT }}

      - name: Generate sources.json
        run: python3 tools/gen-sources.py

      - name: Generate country_regions.json
        run: python3 tools/gen-country-regions.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- sources.json country_regions.json; then
            echo "browse registry unchanged — nothing to commit."
          else
            git config user.name "MuhammadTalhaBaloch"
            git config user.email "MuhammadTalhaBaloch@users.noreply.github.com"
            git add sources.json country_regions.json
            git commit -m "chore: refresh browse registry (sources.json + country_regions.json)"
            git push
          fi
